# amdgpu-tdr.conf — raise the GPU watchdog so long compute sweeps don't
# reset the display-shared gfx1030 (RX 6900 XT). See scripts/gpu_tdr_fix.md.
#
# Option A (chosen 2026-05-29): lockup_timeout = [GFX,Compute,SDMA,Video] ms.
#   GFX kept at 10s (display-hang detection); Compute/SDMA/Video raised to
#   10 min so long NTT compute is not killed. HIP kernels on RDNA2 dispatch
#   to the COMPUTE queues, so the Compute field is the one that matters.
#
# FALLBACK: if validation shows compute STILL resetting at ~10s (i.e. the
# kernels are landing on the GFX ring on this driver), change the FIRST
# field 10000 -> 600000 as well, then reboot again:
#   options amdgpu lockup_timeout=600000,600000,600000,600000
options amdgpu lockup_timeout=10000,600000,600000,600000
